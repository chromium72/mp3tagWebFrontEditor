<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3 Tag Editor</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 今後MP3タグの読み書きを実装する際に利用するライブラリのCDN候補 -->
    <!-- <script src="https://unpkg.com/music-metadata-browser/dist/index.js"></script> -->
    <!-- <script src="https://unpkg.com/browser-id3-writer"></script> -->

    <style>
        /* Custom scrollbar for file list */
        .file-list-container::-webkit-scrollbar { width: 8px; }
        .file-list-container::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .file-list-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .file-list-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Highlight selected items */
        .selected-file { background-color: #eff6ff; border-color: #3b82f6; }

        /* Mobile View Navigation */
        @media (max-width: 767px) {
            body.mobile-view-list #main-editor { display: none; }
            body.mobile-view-list #header-back-btn { display: none; }
            body.mobile-view-list #btn-save, body.mobile-view-list #btn-discard { display: none; }
            body.mobile-view-list #mobile-edit-fab { display: flex; }
            
            body.mobile-view-editor #sidebar-list { display: none; }
            body.mobile-view-editor #header-back-btn { display: flex; }
            body.mobile-view-editor #mobile-edit-fab { display: none; }
            body.mobile-view-editor #btn-open-folder { display: none; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen md:h-screen flex flex-col mobile-view-list overflow-hidden">

    <!-- === Header === -->
    <header class="bg-white shadow-sm border-b px-4 md:px-6 py-4 flex flex-col sm:flex-row justify-between items-center shrink-0 gap-4 sm:gap-0 relative z-20">
        <div class="flex items-center w-full sm:w-auto justify-center sm:justify-start relative">
            <!-- スマホ用戻るボタン -->
            <button id="header-back-btn" class="absolute left-0 p-1.5 hover:bg-gray-100 rounded-full transition-colors text-gray-600 md:hidden flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <h1 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                MP3 Tag Editor
            </h1>
        </div>
        <div class="flex flex-wrap justify-center gap-2 sm:gap-3 w-full sm:w-auto" id="header-actions">
             <button id="btn-open-folder" class="cursor-pointer bg-blue-50 hover:bg-blue-100 text-blue-600 px-3 sm:px-4 py-2 rounded-md font-medium text-sm transition-colors flex items-center gap-2 border border-blue-200 flex-1 sm:flex-none justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line></svg>
                <span class="hidden sm:inline">フォルダを読み込み</span>
                <span class="sm:hidden">開く</span>
            </button>
            
            <button id="btn-save" class="bg-blue-600 hover:bg-blue-700 text-white px-3 sm:px-4 py-2 rounded-md font-medium text-sm transition-colors flex items-center gap-2 shadow-sm flex-1 sm:flex-none justify-center disabled:opacity-50 disabled:cursor-not-allowed">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                保存
            </button>
            <button id="btn-discard" class="bg-white hover:bg-gray-50 text-gray-600 px-3 sm:px-4 py-2 rounded-md font-medium text-sm transition-colors border border-gray-300 flex-1 sm:flex-none justify-center disabled:opacity-50 disabled:cursor-not-allowed">
                破棄
            </button>
        </div>
    </header>

    <main class="flex-1 md:overflow-hidden flex flex-col md:flex-row relative">
        
        <!-- === Sidebar: File List === -->
        <aside id="sidebar-list" class="w-full md:w-1/4 bg-white flex flex-col md:flex-none md:h-full shrink-0 border-b md:border-b-0 relative z-10" style="min-width: 200px;">
            <!-- 全選択ツールバー -->
            <div class="px-4 py-3 border-b bg-gray-50 flex justify-between items-center shrink-0">
                <label class="flex items-center gap-2 text-sm font-medium text-gray-700 cursor-pointer select-none">
                    <input type="checkbox" id="chk-select-all" class="w-4 h-4 text-blue-600 bg-white border-gray-300 rounded cursor-pointer">
                    <span>すべて選択</span>
                </label>
            </div>
            
            <!-- リスト本体 -->
            <div id="file-list" class="flex-1 overflow-y-auto p-2 file-list-container">
                <div id="empty-state" class="flex flex-col items-center justify-center h-full text-gray-400 p-4 text-center mt-10">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-4 opacity-50"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                    <p class="text-sm">フォルダを開いて<br>MP3ファイルを読み込んでください</p>
                </div>
                <!-- JSで動的に追加 -->
            </div>

            <!-- ステータス・スマホ用編集ボタン -->
            <div id="selection-status" class="p-3 bg-gray-50 border-t text-sm text-gray-500 text-center transition-colors shrink-0">
                ファイルが選択されていません
            </div>
            <div id="mobile-edit-fab" class="p-3 bg-white border-t shrink-0 hidden md:hidden">
                <button id="mobile-edit-btn" class="w-full bg-gray-400 text-white px-4 py-3 rounded-lg font-medium text-base shadow-sm flex items-center justify-center gap-2 transition-colors opacity-50 cursor-not-allowed" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
                    選択項目を編集する
                </button>
            </div>
        </aside>

        <!-- === Resizer (PC Only) === -->
        <div id="resizer" class="hidden md:flex w-1 bg-gray-200 cursor-col-resize hover:bg-blue-400 active:bg-blue-500 transition-colors shrink-0 z-10 items-center justify-center select-none group">
            <div class="w-0.5 h-10 bg-gray-400 rounded-full pointer-events-none group-hover:bg-white group-active:bg-white"></div>
        </div>

        <!-- === Main Area: Editor === -->
        <div id="main-editor" class="flex-1 flex flex-col md:h-full md:overflow-hidden bg-white relative">
            
            <!-- 非選択時のオーバーレイ -->
            <div id="editor-empty-overlay" class="absolute inset-0 bg-white z-10 flex flex-col items-center justify-center text-gray-400">
                <p>ファイルを選択すると編集画面が表示されます</p>
            </div>

            <div class="flex-1 md:overflow-y-auto p-4 sm:p-6 lg:p-10">
                <div class="max-w-2xl mx-auto">
                    
                    <!-- Cover Art Section -->
                    <div class="mb-6 sm:mb-8">
                        <label class="block text-sm font-medium text-gray-700 mb-2 sm:mb-3">カバーアート</label>
                        <div class="flex flex-col sm:flex-row items-center sm:items-start gap-4 sm:gap-6">
                            <div class="w-40 h-40 sm:w-48 sm:h-48 bg-gray-100 border border-gray-200 rounded-lg shadow-sm flex flex-col items-center justify-center overflow-hidden relative group shrink-0" onclick="document.getElementById('cover-input').click()">
                                <img src="" alt="Cover Art" class="w-full h-full object-cover transition-opacity duration-200 hidden" id="cover-image-preview">
                                <div id="cover-placeholder" class="text-center text-gray-400 flex flex-col items-center p-4">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                                    <span class="text-xs" id="cover-text">アートワーク</span>
                                </div>
                                <div class="absolute inset-0 bg-black bg-opacity-40 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
                                    <span class="text-white text-sm font-medium">画像を変更</span>
                                    <input type="file" id="cover-input" accept="image/*" class="hidden">
                                </div>
                            </div>
                            
                            <div class="flex flex-col gap-3 pt-2 w-full text-center sm:text-left">
                                <h2 id="editor-title-display" class="text-lg font-bold text-gray-800 mb-1">...</h2>
                                <button id="btn-clear-cover" class="mx-auto sm:mx-0 text-sm bg-white border border-gray-300 px-4 py-2 rounded-md hover:bg-gray-50 text-gray-700 transition-colors shadow-sm w-fit flex items-center gap-2 hidden">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-500"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                    画像をクリア
                                </button>
                                <div class="mt-2 text-sm text-gray-600 bg-blue-50 border border-blue-100 p-3 rounded-md text-left">
                                    <p><strong>ヒント:</strong></p>
                                    <ul class="list-disc pl-5 mt-1 space-y-1 text-xs">
                                        <li>画像エリアをクリックして変更できます。</li>
                                        <li>複数のファイルを選択中の場合、ここで設定した画像が全てに適用されます。</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Text Inputs -->
                    <div class="grid grid-cols-1 gap-4 sm:gap-5 pt-6 border-t border-gray-100 pb-10 md:pb-0">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">タイトル <span class="text-xs text-gray-400 ml-2">(<保持>の場合は元のデータから変更されません)</span></label>
                            <input type="text" id="input-title" data-key="title" class="w-full border-gray-300 border rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">アーティスト</label>
                            <input type="text" id="input-artist" data-key="artist" class="w-full border-gray-300 border rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">アルバム</label>
                            <input type="text" id="input-album" data-key="album" class="w-full border-gray-300 border rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">トラック番号</label>
                                <div class="flex items-center gap-2">
                                    <input type="text" id="input-track" data-key="track" class="w-full border-gray-300 border rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-center">
                                    <span class="text-gray-500">/</span>
                                    <input type="text" id="input-trackTotal" data-key="trackTotal" class="w-full border-gray-300 border rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-center">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">ディスク番号</label>
                                <div class="flex items-center gap-2">
                                    <input type="text" id="input-disc" data-key="disc" class="w-full border-gray-300 border rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-center">
                                    <span class="text-gray-500">/</span>
                                    <input type="text" id="input-discTotal" data-key="discTotal" class="w-full border-gray-300 border rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-center">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // === 1. State Management ===
        const state = {
            files: [], 
            selectedIds: new Set(),
            isMobile: window.innerWidth < 768,
            mobileView: 'list', // 'list' or 'editor'
        };

        const els = {
            fileList: document.getElementById('file-list'),
            emptyState: document.getElementById('empty-state'),
            chkSelectAll: document.getElementById('chk-select-all'),
            selectionStatus: document.getElementById('selection-status'),
            mobileEditBtn: document.getElementById('mobile-edit-btn'),
            btnSave: document.getElementById('btn-save'),
            btnDiscard: document.getElementById('btn-discard'),
            editorEmptyOverlay: document.getElementById('editor-empty-overlay'),
            titleDisplay: document.getElementById('editor-title-display'),
            coverPreview: document.getElementById('cover-image-preview'),
            coverPlaceholder: document.getElementById('cover-placeholder'),
            coverText: document.getElementById('cover-text'),
            btnClearCover: document.getElementById('btn-clear-cover'),
            inputs: {
                title: document.getElementById('input-title'),
                artist: document.getElementById('input-artist'),
                album: document.getElementById('input-album'),
                track: document.getElementById('input-track'),
                trackTotal: document.getElementById('input-trackTotal'),
                disc: document.getElementById('input-disc'),
                discTotal: document.getElementById('input-discTotal'),
            }
        };

        const TEXT_KEYS = Object.keys(els.inputs);

        // === 2. File System Access API (Open & Save) ===
        async function openFolder() {
            if (!('showDirectoryPicker' in window)) {
                alert('お使いのブラウザはフォルダ読み込みをサポートしていません。Chrome/Edgeをご利用ください。※ダミーデータを読み込みます。');
                loadDummyData();
                return;
            }
            try {
                const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                const newFiles = [];
                for await (const entry of dirHandle.values()) {
                    if (entry.kind === 'file' && entry.name.toLowerCase().endsWith('.mp3')) {
                        const file = await entry.getFile();
                        const defaultTitle = entry.name.replace('.mp3', '');
                        const tags = { title: defaultTitle, artist: '', album: '', track: '', trackTotal: '', disc: '1', discTotal: '', cover: null };
                        newFiles.push({ id: entry.name, handle: entry, file: file, tags: { ...tags }, originalTags: { ...tags } });
                    }
                }
                state.files = newFiles;
                state.selectedIds.clear();
                if (state.isMobile) switchMobileView('list');
                renderAll();
            } catch (error) {
                if (error.name !== 'AbortError') console.error(error);
            }
        }

        function loadDummyData() {
            const createDummy = (id, title, artist) => ({
                id, handle: null, file: null,
                tags: { title, artist, album: 'Album X', track: '', trackTotal: '', disc: '1', discTotal: '', cover: null },
                originalTags: { title, artist, album: 'Album X', track: '', trackTotal: '', disc: '1', discTotal: '', cover: null }
            });
            state.files = [
                createDummy('01_intro.mp3', 'Intro', 'Artist A'),
                createDummy('02_main_theme.mp3', 'Main Theme', 'Artist A'),
                createDummy('podcast_ep1.mp3', 'Episode 1', 'Radio Host'),
            ];
            state.selectedIds.clear();
            if (state.isMobile) switchMobileView('list');
            renderAll();
        }

        async function saveChanges() {
            if (state.selectedIds.size === 0) return;
            try {
                let savedCount = 0;
                for (const id of state.selectedIds) {
                    const target = state.files.find(f => f.id === id);
                    if (!target || !target.handle) continue;
                    
                    // TODO: Here you would use browser-id3-writer to modify the binary
                    const writable = await target.handle.createWritable();
                    await writable.write(target.file); 
                    await writable.close();
                    
                    target.originalTags = { ...target.tags }; // Update baseline
                    savedCount++;
                }
                showToast(`${savedCount > 0 ? savedCount : state.selectedIds.size} 件のファイルに保存しました`);
            } catch (error) {
                console.error(error);
                alert('保存に失敗しました。');
            }
        }

        function discardChanges() {
            if (confirm('選択中のファイルの編集内容を元に戻しますか？')) {
                state.files.forEach(f => {
                    if (state.selectedIds.has(f.id)) f.tags = { ...f.originalTags };
                });
                renderEditor();
                renderList(); // Update artist name in list if changed
            }
        }

        function showToast(message) {
            const msg = document.createElement('div');
            msg.className = "fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-3 transform transition-all duration-300 translate-y-0 opacity-100 z-50";
            msg.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> ${message}`;
            document.body.appendChild(msg);
            setTimeout(() => {
                msg.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => msg.remove(), 300);
            }, 3000);
        }

        // === 3. Logic & Event Handlers ===
        function getCommonValue(key) {
            if (state.selectedIds.size === 0) return '';
            const selected = state.files.filter(f => state.selectedIds.has(f.id));
            const firstVal = selected[0].tags[key];
            return selected.every(f => f.tags[key] === firstVal) ? firstVal : '';
        }

        function getPlaceholder(key) {
            if (state.selectedIds.size === 0) return '';
            const selected = state.files.filter(f => state.selectedIds.has(f.id));
            return selected.every(f => f.tags[key] === selected[0].tags[key]) ? '' : '<保持>';
        }

        function updateTagValue(key, value) {
            state.files.forEach(f => {
                if (state.selectedIds.has(f.id)) f.tags[key] = value;
            });
            renderEditor(); // Update placeholders if needed
            if (key === 'artist' || key === 'title') renderList(); // Update list visual
        }

        function handleItemClick(e, id) {
            const isCheckbox = e.target.type === 'checkbox';
            if (isCheckbox) {
                toggleSelection(id);
            } else {
                if (e.ctrlKey || e.metaKey || state.isMobile) {
                    toggleSelection(id);
                } else {
                    state.selectedIds.clear();
                    state.selectedIds.add(id);
                    renderAll();
                }
            }
        }

        function toggleSelection(id) {
            if (state.selectedIds.has(id)) state.selectedIds.delete(id);
            else state.selectedIds.add(id);
            renderAll();
        }

        // === 4. Rendering ===
        function renderAll() {
            renderList();
            renderEditor();
            updateStatus();
        }

        function renderList() {
            if (state.files.length === 0) {
                els.emptyState.style.display = 'flex';
                // Remove all other children
                Array.from(els.fileList.children).forEach(c => { if(c !== els.emptyState) c.remove(); });
                return;
            }
            
            els.emptyState.style.display = 'none';
            // Keep empty state, remove others to rebuild
            Array.from(els.fileList.children).forEach(c => { if(c !== els.emptyState) c.remove(); });

            state.files.forEach(f => {
                const isSelected = state.selectedIds.has(f.id);
                const div = document.createElement('div');
                div.className = `p-3 border rounded-md mb-2 cursor-pointer transition-colors hover:bg-gray-50 flex items-center gap-3 ${isSelected ? 'selected-file' : ''}`;
                div.onclick = (e) => handleItemClick(e, f.id);

                const coverSrc = f.tags.cover;
                const coverHtml = coverSrc 
                    ? `<img src="${coverSrc}" class="w-10 h-10 rounded object-cover flex-shrink-0">`
                    : `<div class="w-10 h-10 bg-gray-200 rounded flex-shrink-0 flex items-center justify-center text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg></div>`;

                div.innerHTML = `
                    <div class="flex items-center justify-center pl-1">
                        <input type="checkbox" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded cursor-pointer" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation();">
                    </div>
                    ${coverHtml}
                    <div class="overflow-hidden">
                        <div class="font-medium text-sm truncate text-gray-800">${f.tags.title || f.id}</div>
                        <div class="text-xs text-gray-500 truncate">${f.tags.artist || 'Unknown Artist'}</div>
                    </div>
                `;
                
                // Add event listener to checkbox directly to ensure it toggles correctly
                div.querySelector('input[type="checkbox"]').onchange = (e) => toggleSelection(f.id);
                
                els.fileList.appendChild(div);
            });

            els.chkSelectAll.checked = state.files.length > 0 && state.selectedIds.size === state.files.length;
        }

        function renderEditor() {
            const count = state.selectedIds.size;
            els.btnSave.disabled = count === 0;
            els.btnDiscard.disabled = count === 0;

            if (count === 0) {
                els.editorEmptyOverlay.style.display = 'flex';
                return;
            }
            els.editorEmptyOverlay.style.display = 'none';

            els.titleDisplay.textContent = count === 1 ? Array.from(state.selectedIds)[0] : `${count} 件のファイルを編集`;

            // Text Inputs (Only update if not currently focused to prevent cursor jumping)
            TEXT_KEYS.forEach(key => {
                const input = els.inputs[key];
                if (document.activeElement !== input) {
                    input.value = getCommonValue(key);
                    input.placeholder = getPlaceholder(key);
                }
            });

            // Cover Art
            const coverVal = getCommonValue('cover');
            const coverPlaceholder = getPlaceholder('cover');

            if (coverVal) {
                els.coverPreview.src = coverVal;
                els.coverPreview.classList.remove('hidden');
                els.coverPlaceholder.style.display = 'none';
                els.btnClearCover.style.display = 'flex';
            } else {
                els.coverPreview.classList.add('hidden');
                els.coverPlaceholder.style.display = 'flex';
                els.coverText.textContent = coverPlaceholder === '<保持>' ? '画像が異なります' : 'アートワーク';
                els.btnClearCover.style.display = 'none';
            }
        }

        function updateStatus() {
            const count = state.selectedIds.size;
            if (count > 0) {
                els.selectionStatus.className = "p-3 bg-blue-50 border-t text-sm text-blue-800 text-center font-medium transition-colors shrink-0";
                els.selectionStatus.innerText = `${count}個のファイルを選択中`;
                
                els.mobileEditBtn.disabled = false;
                els.mobileEditBtn.className = "w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-lg font-medium text-base shadow-sm flex items-center justify-center gap-2 transition-colors";
            } else {
                els.selectionStatus.className = "p-3 bg-gray-50 border-t text-sm text-gray-500 text-center transition-colors shrink-0";
                els.selectionStatus.innerText = "ファイルが選択されていません";
                
                els.mobileEditBtn.disabled = true;
                els.mobileEditBtn.className = "w-full bg-gray-400 text-white px-4 py-3 rounded-lg font-medium text-base shadow-sm flex items-center justify-center gap-2 transition-colors opacity-50 cursor-not-allowed";
            }
        }

        function switchMobileView(view) {
            state.mobileView = view;
            document.body.classList.remove('mobile-view-list', 'mobile-view-editor');
            document.body.classList.add(`mobile-view-${view}`);
            if (view === 'editor') window.scrollTo(0, 0);
        }

        // === 5. Event Listeners Bindings ===
        document.getElementById('btn-open-folder').addEventListener('click', openFolder);
        els.btnSave.addEventListener('click', saveChanges);
        els.btnDiscard.addEventListener('click', discardChanges);
        
        els.chkSelectAll.addEventListener('change', (e) => {
            if (e.target.checked) state.selectedIds = new Set(state.files.map(f => f.id));
            else state.selectedIds.clear();
            renderAll();
        });

        // Mobile Nav
        els.mobileEditBtn.addEventListener('click', () => switchMobileView('editor'));
        document.getElementById('header-back-btn').addEventListener('click', () => switchMobileView('list'));

        // Form Inputs
        TEXT_KEYS.forEach(key => {
            els.inputs[key].addEventListener('input', (e) => updateTagValue(key, e.target.value));
        });

        // Image Handling
        document.getElementById('cover-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) updateTagValue('cover', URL.createObjectURL(file));
            e.target.value = '';
        });
        els.btnClearCover.addEventListener('click', () => updateTagValue('cover', null));

        // Resize Logic (PC)
        const resizer = document.getElementById('resizer');
        const sidebar = document.getElementById('sidebar-list');
        let isResizing = false;

        resizer.addEventListener('mousedown', () => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            let newWidth = e.clientX;
            if (newWidth < 200) newWidth = 200;
            if (newWidth > window.innerWidth * 0.6) newWidth = window.innerWidth * 0.6;
            sidebar.style.width = `${newWidth}px`;
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        });

        window.addEventListener('resize', () => {
            const isNowMobile = window.innerWidth < 768;
            if (state.isMobile !== isNowMobile) {
                state.isMobile = isNowMobile;
                if (!isNowMobile) switchMobileView('list');
            }
        });

        // Init
        renderAll();

    </script>
</body>
</html>
